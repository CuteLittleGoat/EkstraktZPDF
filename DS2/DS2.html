<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0d10">
    <title>Dark Souls II — 100% Achievement Checklist</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b0d10;
            color: #e8e5df;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #0b0d10;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .status {
            max-width: 620px;
            padding: 24px;
            border: 1px solid #2b333d;
            border-radius: 14px;
            background: #12161b;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, .35);
        }

        .status strong {
            display: block;
            margin-bottom: 8px;
            color: #d1a85a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.35rem;
        }

        .status p {
            margin: 0;
            color: #a39f98;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <div class="status" id="status" role="status" aria-live="polite">
        <strong>Wczytywanie checklisty…</strong>
        <p>Przygotowywanie danych Dark Souls II.</p>
    </div>

    <script>
    (() => {
        "use strict";

        const sourceUrl = "https://raw.githubusercontent.com/CuteLittleGoat/EkstraktZPDF/8e8b23f1ad9d8f0669ffa33c5c703500dc0dd931/DS2.html";
        const status = document.getElementById("status");

        const runtime = `<script>
(() => {
    const checks = Array.from(document.querySelectorAll(".progress-check"));
    const rows = Array.from(document.querySelectorAll(".check-row"));
    const searchBox = document.getElementById("searchBox");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const resetButton = document.getElementById("resetButton");

    function applyRowState(check) {
        const row = check.closest(".check-row");
        if (row) row.classList.toggle("done", check.checked);
    }

    function updateProgress() {
        const completed = checks.filter(check => check.checked).length;
        const percent = checks.length ? (completed / checks.length) * 100 : 0;
        progressText.textContent = \`\${completed} / \${checks.length}\`;
        progressFill.style.width = \`\${percent}%\`;

        document.querySelectorAll(".content-section").forEach(section => {
            const sectionChecks = Array.from(section.querySelectorAll(".progress-check"));
            const sectionDone = sectionChecks.filter(check => check.checked).length;
            const counter = section.querySelector(".section-counter");
            if (counter) counter.textContent = \`\${sectionDone} / \${sectionChecks.length}\`;
        });
    }

    checks.forEach(check => {
        check.checked = false;
        applyRowState(check);

        check.addEventListener("change", () => {
            applyRowState(check);
            updateProgress();
        });
    });

    searchBox.addEventListener("input", () => {
        const query = searchBox.value.trim().toLocaleLowerCase("pl");
        rows.forEach(row => {
            const haystack = row.dataset.search || row.textContent.toLocaleLowerCase("pl");
            row.classList.toggle("filtered-out", query && !haystack.includes(query));
        });

        document.querySelectorAll(".content-section").forEach(section => {
            const visibleRows = section.querySelectorAll(".check-row:not(.filtered-out)").length;
            section.style.display = visibleRows || !query ? "" : "none";
        });
    });

    resetButton.addEventListener("click", () => {
        const confirmed = window.confirm("Czy na pewno wyczyścić wszystkie zaznaczenia?");
        if (!confirmed) return;

        checks.forEach(check => {
            check.checked = false;
            applyRowState(check);
        });
        updateProgress();
    });

    updateProgress();
})();
<\/script>`;

        fetch(sourceUrl, { cache: "no-store" })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Błąd HTTP ${response.status}`);
                }
                return response.text();
            })
            .then(source => {
                const scriptStart = source.lastIndexOf("<script>");
                const bodyEnd = source.lastIndexOf("</body>");

                if (scriptStart < 0 || bodyEnd < 0 || scriptStart > bodyEnd) {
                    throw new Error("Nieprawidłowa struktura źródłowej checklisty");
                }

                let cleaned = source.slice(0, scriptStart) + runtime + "\n" + source.slice(bodyEnd);
                cleaned = cleaned.replace(
                    "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Zaznaczenie checkboxa przekreśla cały krok, zmienia tekst na szary i pochyły. Postęp jest zapisywany lokalnie w tej przeglądarce.",
                    "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Zaznaczenie checkboxa przekreśla cały krok, zmienia tekst na szary i pochyły."
                );
                cleaned = cleaned.replace(
                    "JavaScript jest wyłączony. Checkboxy będą widoczne, ale postęp nie będzie zapisywany i wiersze nie będą automatycznie formatowane.",
                    "JavaScript jest wyłączony. Checkboxy będą widoczne, ale wiersze nie będą automatycznie formatowane."
                );

                document.open();
                document.write(cleaned);
                document.close();
            })
            .catch(error => {
                console.error("Nie udało się wczytać checklisty:", error);
                status.innerHTML = "<strong>Nie udało się wczytać checklisty</strong><p>Sprawdź połączenie z internetem i odśwież stronę.</p>";
            });
    })();
    </script>
</body>
</html>
