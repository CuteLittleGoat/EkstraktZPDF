<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0d10">
    <title>Dark Souls II — 100% Achievement Checklist</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b0d10;
            color: #e8e5df;
        }

        * { box-sizing: border-box; }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #0b0d10;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .status {
            max-width: 620px;
            padding: 24px;
            border: 1px solid #2b333d;
            border-radius: 14px;
            background: #12161b;
            text-align: center;
            box-shadow: 0 16px 40px rgba(0, 0, 0, .35);
        }

        .status strong {
            display: block;
            margin-bottom: 8px;
            color: #d1a85a;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 1.35rem;
        }

        .status p {
            margin: 0;
            color: #a39f98;
            line-height: 1.55;
        }
    </style>
</head>
<body>
    <div class="status" id="status" role="status" aria-live="polite">
        <strong>Wczytywanie checklisty…</strong>
        <p>Przygotowywanie danych Dark Souls II.</p>
    </div>

    <script>
    (() => {
        "use strict";

        const sourceUrl = "https://raw.githubusercontent.com/CuteLittleGoat/EkstraktZPDF/8e8b23f1ad9d8f0669ffa33c5c703500dc0dd931/DS2.html";
        const status = document.getElementById("status");
        const firebaseRuntime = `
<style>
    th {
        position: static !important;
        top: auto !important;
    }
</style>
<script src="firebase-config.js"><\/script>
<script type="module" src="firebase-sync.js"><\/script>`;

        fetch(sourceUrl, { cache: "no-store" })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Błąd HTTP ${response.status}`);
                }
                return response.text();
            })
            .then(source => {
                const scriptStart = source.lastIndexOf("<script>");
                const bodyEnd = source.lastIndexOf("</body>");

                if (scriptStart < 0 || bodyEnd < 0 || scriptStart > bodyEnd) {
                    throw new Error("Nieprawidłowa struktura źródłowej checklisty");
                }

                let cleaned = source.slice(0, scriptStart) + firebaseRuntime + "\n" + source.slice(bodyEnd);
                cleaned = cleaned.replace(
                    "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Zaznaczenie checkboxa przekreśla cały krok, zmienia tekst na szary i pochyły. Postęp jest zapisywany lokalnie w tej przeglądarce.",
                    "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Stan checkboxów jest synchronizowany między urządzeniami przez Firebase."
                );
                cleaned = cleaned.replace(
                    "JavaScript jest wyłączony. Checkboxy będą widoczne, ale postęp nie będzie zapisywany i wiersze nie będą automatycznie formatowane.",
                    "JavaScript jest wyłączony. Synchronizacja postępu i automatyczne formatowanie wierszy nie będą działały."
                );
                cleaned = cleaned.replace(
                    "Jeden samodzielny plik HTML. Wszystkie style i skrypty są osadzone w dokumencie; połączenie z internetem nie jest wymagane.",
                    "Stan checklisty jest przechowywany w dokumencie Firebase DS2/progress i synchronizowany w czasie rzeczywistym."
                );

                document.open();
                document.write(cleaned);
                document.close();
            })
            .catch(error => {
                console.error("Nie udało się wczytać checklisty:", error);
                status.innerHTML = "<strong>Nie udało się wczytać checklisty</strong><p>Sprawdź połączenie z internetem i odśwież stronę.</p>";
            });
    })();
    </script>
</body>
</html>
