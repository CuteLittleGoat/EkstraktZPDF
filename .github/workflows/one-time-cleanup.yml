name: One-time repository cleanup

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.head_commit.message == 'Run one-time repository cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore checklist and remove legacy persistence
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          source_commit = "8e8b23f1ad9d8f0669ffa33c5c703500dc0dd931"
          html = subprocess.check_output(
              ["git", "show", f"{source_commit}:DS2.html"],
              text=True,
              encoding="utf-8"
          )

          html = html.replace(
              "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Zaznaczenie checkboxa przekreśla cały krok, zmienia tekst na szary i pochyły. Postęp jest zapisywany lokalnie w tej przeglądarce.",
              "Treść instrukcji została zachowana w oryginalnym języku i ułożona w tabele. Zaznaczenie checkboxa przekreśla cały krok, zmienia tekst na szary i pochyły."
          )
          html = html.replace(
              "JavaScript jest wyłączony. Checkboxy będą widoczne, ale postęp nie będzie zapisywany i wiersze nie będą automatycznie formatowane.",
              "JavaScript jest wyłączony. Checkboxy będą widoczne, ale wiersze nie będą automatycznie formatowane."
          )
          html = html.replace(
              '    const storagePrefix = "ds2-sotfs-checklist:";\n',
              ""
          )
          html = html.replace(
              "    function storageKey(check) {\n        return storagePrefix + check.dataset.key;\n    }\n\n",
              ""
          )
          html = html.replace(
              '        check.checked = localStorage.getItem(storageKey(check)) === "1";\n',
              "        check.checked = false;\n"
          )
          html = html.replace(
              '            localStorage.setItem(storageKey(check), check.checked ? "1" : "0");\n',
              ""
          )
          html = html.replace(
              "            localStorage.removeItem(storageKey(check));\n",
              ""
          )
          html = html.replace(
              "Czy na pewno usunąć wszystkie zapisane zaznaczenia?",
              "Czy na pewno wyczyścić wszystkie zaznaczenia?"
          )

          destination = Path("DS2/DS2.html")
          destination.write_text(html, encoding="utf-8")

          workflow = Path(".github/workflows/one-time-cleanup.yml")
          workflow.unlink()

      - name: Validate cleanup
        shell: bash
        run: |
          set -euo pipefail
          test -f DS2/01.docx
          test -f DS2/02.docx
          test -f DS2/DS2.html
          ! grep -Eiq 'localStorage|indexedDB|serviceWorker|manifest\.webmanifest|storagePrefix|openDatabase|saveProgress|replaceProgress' DS2/DS2.html
          test -z "$(find . -maxdepth 1 -type f -print)"

      - name: Commit cleaned repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Clean repository and remove legacy persistence"
          git push
